<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo-icons/web/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/logo-icons/web/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slaim</title>
  </head>
  <body>
    <script>
      (function () {
        var theme = localStorage.getItem("slides-for-devs-theme");
        var dark = theme === "dark" || (theme !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
