# Netlify: el bundle (Vite + dependencias pesadas) supera el heap por defecto de Node (~2 GiB).
# Ver https://ntl.fyi/exit-code-134 y documentación de NODE_OPTIONS.
[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_OPTIONS = "--max-old-space-size=4096"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Misma política que Vite en dev: el login con Google vía popup requiere poder enlazar con la ventana principal.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

